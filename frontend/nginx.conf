server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Browsers request /favicon.ico by default; without this, try_files would serve index.html
    # (broken tab icon) instead of the real asset.
    location = /favicon.ico {
        return 302 /favicon.svg;
    }

    # Ensure SPA shell updates (favicon + title changes) are not stuck behind browser cache
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
    }

    # Static assets
    location /assets/ {
        try_files $uri =404;
        access_log off;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # Proxy REST + actuator
    location /api/ {
        proxy_pass http://backend:8080/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # Proxy WebSocket / SockJS
    location /ws/ {
        proxy_pass http://backend:8080/ws/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 86400s;
    }

    # SPA fallback
    location / {
        try_files $uri /index.html;
    }
}
